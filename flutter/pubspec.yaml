name: budgetarian
description: A stylish pastel pink budget tracker with AI insights and SQLite storage.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.19.0
  provider: ^6.1.1
  fl_chart: ^0.66.0
  google_generative_ai: ^0.2.0
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.0
  google_fonts: ^8.1.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/applogo.png
